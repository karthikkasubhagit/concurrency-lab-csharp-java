name: Build

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  csharp:
    name: C# / .NET 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build csharp/ConcurrencyLab --configuration Release
      - run: dotnet run --project csharp/ConcurrencyLab --configuration Release -- all

  java:
    name: Java / JDK 21
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: ./java/run.sh all
